<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Numberblocks — whole numbers & decimals</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --red:    #DE151D;
    --orange: #E89223;
    --yellow: #E6C40C;
    --gap: 0px;          /* animates 0 -> grid lines when the square divides */
    --face: 100%;        /* One's face: full block (whole) -> one cell (divided) */
    --sq: 300px;         /* decimal square size, set by JS to fit the stage */
  }

  html, body { height: 100%; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    overflow: hidden;
    user-select: none;
    display: flex;
    flex-direction: column;
    padding: 10px 12px;
    gap: 6px;
  }

  /* ===== top area: info (left) + stage (right) ===== */
  #main { flex: 1 1 auto; min-height: 0; display: flex; align-items: center; gap: 16px; }

  #info {
    flex: 0 0 auto; width: clamp(180px, 26vw, 320px);
    display: flex; flex-direction: column; justify-content: center;
    text-align: left; padding-left: 6px;
  }
  #title { font-size: clamp(15px, 1.8vw, 22px); font-weight: 800;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.3); opacity: 0.95; line-height: 1.1; }
  #decimal-display { font-size: clamp(50px, 8.5vw, 116px); font-weight: 900; color: #FFD700;
    text-shadow: 3px 3px 6px rgba(0,0,0,0.35); line-height: 1; margin: 2px 0 4px;
    letter-spacing: 1px; word-break: break-word; }
  #subtitle { font-size: clamp(13px, 1.5vw, 19px); font-weight: 600;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.3); min-height: 2.6em; }
  #fraction { font-size: clamp(16px, 2.1vw, 28px); font-weight: 900;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.3); min-height: 1.2em; margin-top: 6px; }
  #fraction .frac { color: #fff; }
  #fraction .reduced { color: #7CFF9B; }
  #fraction .eq { color: #FFD700; margin: 0 6px; }
  #breakdown { font-size: clamp(13px, 1.6vw, 20px); font-weight: 700; min-height: 1.3em; margin-top: 2px; }
  #breakdown .t { color: #FF8A8A; }
  #breakdown .h { color: #FFE873; }
  #breakdown .q, #breakdown .p { color: #FFFFFF; }

  /* ===== the stage ===== */
  #stage-wrap { flex: 1 1 auto; min-width: 0; min-height: 0; height: 100%;
    display: flex; align-items: center; justify-content: center; position: relative; }

  /* --- decimal square --- */
  #square {
    position: relative; width: var(--sq); height: var(--sq);
    transform: scale(0.26); transform-origin: center center;
    transition: transform 0.95s cubic-bezier(0.34, 1.4, 0.64, 1);
    filter: drop-shadow(0 12px 18px rgba(0,0,0,0.35));
  }
  #square.enlarged { transform: scale(1); }
  #square.hidden, #whole.hidden { display: none; }

  #grid {
    width: 100%; height: 100%;
    display: grid; grid-template-columns: repeat(10, 1fr); grid-template-rows: repeat(10, 1fr);
    gap: var(--gap);
    background: rgba(0,0,0,0.28); border: 4px solid rgba(0,0,0,0.28); border-radius: 12px;
    padding: var(--gap);
    transition: gap 0.6s ease, padding 0.6s ease, background 0.6s ease;
  }
  .cell { background: var(--red); border-radius: 0; position: relative;
    transition: background-color 0.35s ease, border-radius 0.5s ease; }
  #grid.divided .cell { border-radius: 3px; }
  /* per-cell shine only once divided; before that it's one solid block */
  #grid.divided .cell::after {
    content: ''; position: absolute; top: 0; left: 0; right: 55%; bottom: 55%;
    background: rgba(255,255,255,0.22); border-radius: 3px 0 0 0; pointer-events: none;
  }
  .cell.empty      { background: rgba(255,255,255,0.13); }
  .cell.tenth      { background: var(--red); }
  .cell.hundredth  { background: var(--yellow); }
  .cell.quarter    { background: var(--red); }
  @keyframes pop { 0%{transform:scale(0.4);} 60%{transform:scale(1.12);} 100%{transform:scale(1);} }
  .cell.filling { animation: pop 0.3s ease; z-index: 2; }

  /* one big shine while the square is still a single solid block */
  #unishine { position: absolute; inset: 0; z-index: 2; pointer-events: none;
    border-radius: 12px; overflow: hidden; transition: opacity 0.4s ease; }
  #unishine::after { content: ''; position: absolute; top: 0; left: 0; right: 55%; bottom: 55%;
    background: rgba(255,255,255,0.25); border-radius: 12px 0 0 0; }
  #unishine.off { opacity: 0; }

  /* quarter guide cross */
  #quarter-guide { position: absolute; inset: 4px; z-index: 4; pointer-events: none;
    opacity: 0; transition: opacity 0.5s ease; }
  #quarter-guide.on { opacity: 1; }
  #quarter-guide::before, #quarter-guide::after { content: ''; position: absolute;
    background: rgba(255,255,255,0.9); box-shadow: 0 0 6px rgba(0,0,0,0.45); border-radius: 2px; }
  #quarter-guide::before { left: 50%; top: 0; bottom: 0; width: 4px; transform: translateX(-50%); }
  #quarter-guide::after  { top: 50%; left: 0; right: 0; height: 4px; transform: translateY(-50%); }

  /* One's face on the square */
  #face { position: absolute; top: 0; left: 0; width: var(--face); height: var(--face);
    z-index: 6; pointer-events: none; transition: width 0.6s ease, height 0.6s ease; }

  /* --- whole-number / mixed stage --- */
  #whole { display: flex; align-items: flex-end; justify-content: center; gap: 0px;
    max-width: 100%; max-height: 100%; transition: gap 0.8s cubic-bezier(0.34,1.2,0.64,1); }
  .wgroup { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .wgrid  { display: grid; filter: drop-shadow(0 8px 12px rgba(0,0,0,0.3)); }
  .wlabel { font-size: clamp(12px, 1.6vw, 20px); font-weight: 900; color: #fff;
    text-shadow: 2px 2px 3px rgba(0,0,0,0.35); opacity: 0; transition: opacity 0.5s ease; }
  .wlabel.show { opacity: 1; }
  .wplus { align-self: center; font-size: clamp(20px,3vw,44px); font-weight: 900; color: #FFD700;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.3); padding-bottom: 26px; opacity: 0;
    transition: opacity 0.4s ease; }
  .wplus.show { opacity: 1; }

  .wcell { border-radius: 3px; border: 2px solid rgba(0,0,0,0.2); position: relative;
    opacity: 0; transform: translateY(-40px) scale(0.6);
    transition: opacity 0.25s ease, transform 0.35s cubic-bezier(0.34,1.56,0.64,1); }
  .wcell.show { opacity: 1; transform: none; }
  .wcell::after { content: ''; position: absolute; top: 0; left: 0; right: 55%; bottom: 55%;
    background: rgba(255,255,255,0.22); border-radius: 3px 0 0 0; pointer-events: none; }
  .wcell.subtracted { outline: 3px solid #fff; outline-offset: -1px; z-index: 3; }

  /* Numberblocks dance gently at rest */
  @keyframes idleBob {
    0%,100% { transform: translateY(0) rotate(0deg); }
    22% { transform: translateY(-5px) rotate(-1.6deg); }
    50% { transform: translateY(0) rotate(0deg); }
    72% { transform: translateY(-5px) rotate(1.6deg); }
  }
  .dancing { animation: idleBob 2.6s ease-in-out infinite; transform-origin: 50% 100%; }

  /* combine (a + b) animation */
  #combine { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; max-height: 100%; }
  #combine.hidden { display: none; }
  .op-wrap { display: flex; flex-direction: column; align-items: center;
    transition: transform 0.8s cubic-bezier(0.34,1.56,0.64,1), opacity 0.4s; }
  .op-grid { display: inline-grid; gap: 3px; filter: drop-shadow(0 8px 12px rgba(0,0,0,0.3)); }
  .op-label { font-size: clamp(20px,4.5vw,40px); font-weight: 900; color: #fff;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.3); margin-top: 8px; }
  .op-sym { font-size: clamp(30px,6vw,58px); font-weight: 900; color: #FFD700;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.3); align-self: center; opacity: 0; transition: opacity 0.3s; padding-bottom: 34px; }
  .op-sym.show { opacity: 1; }
  .mcell { border-radius: 4px; border: 2px solid rgba(0,0,0,0.2); position: relative; overflow: hidden; }
  .mcell::after { content: ''; position: absolute; top: 0; left: 0; right: 50%; bottom: 50%;
    background: rgba(255,255,255,0.25); border-radius: 4px 0 0 0; }
  .walk-in-left  { animation: walkLeft 1.8s ease-out forwards; }
  .walk-in-right { animation: walkRight 1.8s ease-out forwards; }
  @keyframes walkLeft {
    0%{transform:translateX(-110vw) rotate(0);} 16%{transform:translateX(-70vw) translateY(-12px) rotate(8deg);}
    32%{transform:translateX(-30vw) rotate(8deg);} 48%{transform:translateX(0) rotate(5deg);}
    60%{transform:translateX(0) rotate(0);} 100%{transform:translateX(0) rotate(0);} }
  @keyframes walkRight {
    0%{transform:translateX(110vw) rotate(0);} 16%{transform:translateX(70vw) translateY(-12px) rotate(-8deg);}
    32%{transform:translateX(30vw) rotate(-8deg);} 48%{transform:translateX(0) rotate(-5deg);}
    60%{transform:translateX(0) rotate(0);} 100%{transform:translateX(0) rotate(0);} }

  /* mixed-number unit squares */
  .unit { position: relative; border-radius: 8px; filter: drop-shadow(0 8px 12px rgba(0,0,0,0.3));
    opacity: 0; transform: scale(0.6); transition: opacity 0.3s ease, transform 0.4s cubic-bezier(0.34,1.56,0.64,1); }
  .unit.show { opacity: 1; transform: none; }
  .unit.solid { background: var(--red); border: 3px solid rgba(0,0,0,0.25); overflow: hidden; }
  .unit.solid::after { content: ''; position: absolute; top: 0; left: 0; right: 55%; bottom: 55%;
    background: rgba(255,255,255,0.24); border-radius: 6px 0 0 0; }
  .unit-grid { display: grid; grid-template-columns: repeat(10,1fr); grid-template-rows: repeat(10,1fr);
    gap: 2px; padding: 2px; background: rgba(0,0,0,0.28); border: 3px solid rgba(0,0,0,0.28); border-radius: 8px; }
  .ucell { border-radius: 2px; background: rgba(255,255,255,0.13); }
  .ucell.tenth { background: var(--red); }
  .ucell.hundredth { background: var(--yellow); }
  .ucell.quarter { background: var(--red); }
  .ulabel { position: absolute; bottom: -26px; left: 0; right: 0; text-align: center;
    font-size: clamp(12px,1.6vw,20px); font-weight: 900; color: #fff; text-shadow: 2px 2px 3px rgba(0,0,0,0.35); }

  /* shared face */
  .nb-face { position: absolute; inset: 0; z-index: 3; pointer-events: none; overflow: visible; }
  .nb-eye { width: 22%; height: 28%; background: white; border-radius: 50%; position: absolute; top: 22%;
    display: flex; align-items: center; justify-content: center; box-shadow: 0 0 2px rgba(0,0,0,0.3); }
  .nb-eye::after { content: ''; width: 45%; height: 45%; background: #222; border-radius: 50%; }
  .nb-eye-left  { left: 20%; }
  .nb-eye-right { right: 20%; }
  .nb-eye-single { width: 34%; height: 42%; left: 50%; top: 25%; transform: translateX(-50%); }
  .nb-eye-single::after { width: 42%; height: 42%; }
  .nb-mouth { position: absolute; bottom: 22%; left: 50%; transform: translateX(-50%);
    width: 30%; height: 16%; border: 3px solid #333; border-top: none; border-radius: 0 0 60% 60%;
    background: rgba(255,255,255,0.15); }

  /* ===== controls ===== */
  #controls { flex: 0 0 auto; display: flex; flex-direction: column; align-items: center; gap: 7px; }
  #entry { display: flex; gap: 8px; align-items: center; }
  #num-input { font-size: clamp(18px, 3vw, 28px); font-weight: 800; text-align: center;
    width: min(60vw, 300px); padding: 7px 12px; border: 3px solid #FFD700; border-radius: 12px;
    outline: none; background: rgba(255,255,255,0.96); color: #333; }
  #num-input::placeholder { color: #999; font-weight: 600; font-size: 0.8em; }
  #go { font-size: clamp(16px, 2.6vw, 24px); font-weight: 900; color: white; background: var(--red);
    border: none; border-radius: 12px; padding: 8px 18px; cursor: pointer; box-shadow: 0 3px 0 #9a0f14; }
  #go:active { transform: translateY(2px); box-shadow: 0 1px 0 #9a0f14; }
  #presets { display: flex; flex-wrap: wrap; gap: 7px; justify-content: center; }
  .chip { font-size: clamp(13px, 2.2vw, 20px); font-weight: 800; color: #4a2c73; background: #FFD700;
    border: none; border-radius: 999px; padding: 6px 14px; cursor: pointer; box-shadow: 0 3px 0 #b89b00;
    transition: transform 0.1s, box-shadow 0.1s; }
  .chip:hover { transform: translateY(-2px); }
  .chip:active { transform: translateY(2px); box-shadow: 0 1px 0 #b89b00; }
  .chip.tour { background: #7CFF9B; box-shadow: 0 3px 0 #3aa055; color: #164d29; }
  .chip.tour.on { background: #ff8a8a; box-shadow: 0 3px 0 #b34a4a; color: #5a1616; }
  .chip.reset { background: #ffffff; box-shadow: 0 3px 0 #b0b0c0; color: #444; }

  @media (max-width: 700px), (max-aspect-ratio: 3/4) {
    #main { flex-direction: column; gap: 6px; }
    #info { width: 100%; flex-direction: row; flex-wrap: wrap; align-items: baseline;
      justify-content: center; text-align: center; gap: 4px 12px; padding-left: 0; }
    #decimal-display { font-size: clamp(40px, 14vw, 84px); margin: 0; }
    #subtitle { width: 100%; min-height: 1.4em; }
    #fraction { margin-top: 0; }
    #breakdown { width: 100%; }
    #title { width: 100%; }
  }
</style>
</head>
<body>

<div id="main">
  <div id="info">
    <div id="title">Numberblocks</div>
    <div id="decimal-display">1</div>
    <div id="subtitle">Type a number — a whole number like <b>102</b>, a decimal like <b>0.42</b>, or a mix like <b>1.5</b>.</div>
    <div id="fraction"></div>
    <div id="breakdown"></div>
  </div>

  <div id="stage-wrap">
    <div id="square">
      <div id="grid"></div>
      <div id="unishine"></div>
      <div id="quarter-guide"></div>
      <div id="face">
        <div class="nb-eye nb-eye-single"></div>
        <div class="nb-mouth"></div>
      </div>
    </div>
    <div id="whole" class="hidden"></div>
    <div id="combine" class="hidden"></div>
  </div>
</div>

<div id="controls">
  <div id="entry">
    <input id="num-input" type="text" inputmode="text"
      placeholder="type e.g. 102, 1.5, 1+2, 10-3, 3=1+2" spellcheck="false"
      autocomplete="off" autocorrect="off" autocapitalize="off" />
    <button id="go">Show!</button>
  </div>
  <div id="presets">
    <button class="chip" data-v="25">25</button>
    <button class="chip" data-v="102">102</button>
    <button class="chip" data-v="1+2">1+2</button>
    <button class="chip" data-v="10-3">10-3</button>
    <button class="chip" data-v="3=1+2">3=1+2</button>
    <button class="chip" data-v="0.5">0.5</button>
    <button class="chip" data-v="0.25">0.25</button>
    <button class="chip" data-v="1.5">1.5</button>
    <button class="chip tour" id="tour-btn">▶ Tour</button>
    <button class="chip reset" id="reset-btn">↺ Reset</button>
  </div>
</div>

<script>
// ===================== SERVER LOG (fire-and-forget) =====================
const SERVER = window.location.origin;
function serverLog(entry) {
  try {
    fetch(`${SERVER}/log`, { method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(entry) }).catch(() => {});
  } catch {}
}

// ===================== NUMBERBLOCKS COLORS (ported) =====================
const BASE_COLORS = { 1:'#DE151D',2:'#E89223',3:'#E6C40C',4:'#38B500',5:'#23B0DB',
  6:'#5A35C3',7:'rainbow',8:'#FD40A4',9:'grey3',10:'#EEEEEE' };
const TENS_COLORS = { 1:'#EEEEEE',2:'#F4A0A0',3:'#F5E6A0',4:'#B8F0A0',5:'#A0E4F0',
  6:'#C4A0F0',7:'rainbow-light',8:'#F0A0D4',9:'#C4C8CB',10:'#F4A0A0' };
const TENS_BORDERS = { 1:'#DE151D',2:'#DE151D',3:'#C4A000',4:'#2A8000',5:'#1A8AAA',
  6:'#4A2A9A',7:'#AA77CC',8:'#CC70A4',9:'#999999',10:'#DE151D' };
const RAINBOW = ['#DE151D','#E89223','#E6C40C','#38B500','#23B0DB','#4B0082','#8B00FF'];
const RAINBOW_LIGHT = ['#F4A0A0','#F5CCA0','#F5E6A0','#B8F0A0','#A0E4F0','#B0A0D0','#D0A0F0'];
const GREY_SHADES = ['#8A8B8F','#A5A9AC','#C4C8CB'];

function getBlockColorAndBorder(n, i) {
  if (n <= 10) {
    if (n === 7) return { bg: RAINBOW[i % RAINBOW.length], border: null };
    if (n === 9) return { bg: GREY_SHADES[i % 3], border: null };
    if (n === 10) return { bg: '#EEEEEE', border: '#DE151D' };
    return { bg: BASE_COLORS[n], border: null };
  }
  const tensDigit = Math.floor(n / 10), onesDigit = n % 10, tensCount = tensDigit * 10;
  if (onesDigit === 0 || i < tensCount) {
    const td = tensDigit;
    if (td === 7) return { bg: RAINBOW_LIGHT[i % RAINBOW_LIGHT.length], border: TENS_BORDERS[7] };
    if (td === 9) return { bg: '#C4C8CB', border: TENS_BORDERS[9] };
    return { bg: TENS_COLORS[td], border: TENS_BORDERS[td] };
  } else {
    const oi = i - tensCount;
    if (onesDigit === 7) return { bg: RAINBOW[oi % RAINBOW.length], border: null };
    if (onesDigit === 9) return { bg: GREY_SHADES[oi % 3], border: null };
    return { bg: BASE_COLORS[onesDigit], border: null };
  }
}

// Compact character shape for 1-9 (ported from the existing game)
function getShape(n) {
  if (n <= 0) return { rows: 0, cols: 0, lastRowCols: 0 };
  if (n <= 7) return { rows: n, cols: 1, lastRowCols: 1 };
  let cols = 1;
  for (let c = 2; c * c <= n; c++) if (n % c === 0) cols = c;
  if (cols >= 2) return { rows: n / cols, cols, lastRowCols: cols };
  cols = getShape(n - 1).cols; if (cols < 2) cols = 2;
  return { rows: Math.ceil(n / cols), cols, lastRowCols: n % cols || cols };
}

// Place-value parts (largest first)
function getPlaceParts(n) {
  const H = Math.floor(n / 100), T = Math.floor(n / 10) % 10, O = n % 10;
  const parts = [];
  if (H > 0) parts.push({ kind: 'hundreds', value: H * 100, digit: H });
  if (T > 0) parts.push({ kind: 'tens', value: T * 10, digit: T });
  if (O > 0) parts.push({ kind: 'ones', value: O, digit: O });
  return parts;
}
function placeDims(p) {
  if (p.kind === 'ones') return { cols: 1, rows: p.digit };
  if (p.kind === 'tens') return { cols: p.digit, rows: 10 };
  return { cols: p.digit * 10, rows: 10 };
}
function placeColorFn(p) {
  if (p.kind === 'hundreds') return (i) => getBlockColorAndBorder(p.digit, i);
  return (i) => getBlockColorAndBorder(p.value, i);
}

// ===================== SHAPE PRIMITIVES =====================
// Every whole number has a list of available shapes: all factor-pair rectangles
// (upright before wide, most-square first) plus a base-ten place-value layout.
// Clicking a Numberblock rotates through this list.
function allShapes(n) {
  if (n <= 0) return [{ kind: 'rect', rows: 0, cols: 0 }];
  const rects = [];
  for (let c = 1; c * c <= n; c++) if (n % c === 0) {
    const r = n / c;
    rects.push({ rows: r, cols: c });
    if (r !== c) rects.push({ rows: c, cols: r });
  }
  // most-square first; within a pair, upright (taller) before wide
  rects.sort((a, b) => (Math.abs(a.rows - a.cols) - Math.abs(b.rows - b.cols)) || (b.rows - a.rows));
  const shapes = rects.map(x => ({ kind: 'rect', rows: x.rows, cols: x.cols }));
  if (n >= 10 && getPlaceParts(n).length >= 2) shapes.push({ kind: 'place' });
  return shapes;
}
// Preferred default: the most-square rectangle when it's reasonably compact
// (25 -> 5x5, 12 -> 4x3, 100 -> 10x10); otherwise the place-value layout
// (34 -> 30+4, 102 -> 100+2).
function defaultShapeIndex(n, shapes) {
  const best = shapes[0];
  const pi = shapes.findIndex(s => s.kind === 'place');
  if (n >= 100) {   // hundreds read best as place value, unless a clean square (100, 144)
    if (best && best.kind === 'rect' && best.cols === best.rows) return 0;
    return pi >= 0 ? pi : 0;
  }
  if (best && best.kind === 'rect' && best.cols >= 2 && best.rows / best.cols <= 2) return 0;
  if (n <= 9) return 0;
  return pi >= 0 ? pi : 0;
}
function shapeDims(n, shape) {
  if (shape.kind === 'rect') return { cols: shape.cols, rows: shape.rows, gaps: 0 };
  const parts = getPlaceParts(n);
  return { cols: parts.reduce((s, p) => s + placeDims(p).cols, 0),
           rows: Math.max(...parts.map(p => placeDims(p).rows), 1),
           gaps: (parts.length - 1) * 10 };
}

// ===================== PLACE-VALUE COLOR =====================
// Single digits: assigned color. Tens: pastel of the digit. Hundreds: a
// checkerboard of the digit's regular + pastel color. (10 white + 4 green = 14.)
function hundredsCell(d, i, r, c) {
  let base, pastel, border = null;
  if (d === 7) { base = RAINBOW[i % 7]; pastel = RAINBOW_LIGHT[i % 7]; }
  else if (d === 9) { base = GREY_SHADES[i % 3]; pastel = '#D8DADC'; }
  else if (d === 10) { base = '#EEEEEE'; pastel = '#F7C6C6'; border = '#DE151D'; }
  else if (d === 1) { base = '#DE151D'; pastel = '#FA8072'; }   // Hundred: salmon + red
  else { base = BASE_COLORS[d]; pastel = TENS_COLORS[d]; }
  return { bg: ((r + c) % 2 === 1) ? pastel : base, border };
}
function unitStyle(n, i, r, c) {
  if (n < 100) return getBlockColorAndBorder(n, i);
  const Hd = Math.floor(n / 100), hCount = Hd * 100;
  if (i < hCount) return hundredsCell(Hd, i, r, c);
  const rem = n % 100;
  return getBlockColorAndBorder(rem === 0 ? 100 : rem, i - hCount);
}

// ===================== INPUT PARSING (math, fractions, percents) =====================
function evalExpr(raw) {
  let s = String(raw).trim().toLowerCase();
  if (s === '') return null;
  s = s.replace(/×/g, '*').replace(/÷/g, '/').replace(/x/g, '*').replace(/\s+/g, '');
  s = s.replace(/(\d+(?:\.\d+)?)%/g, '($1/100)');
  if (!/^[0-9.+\-*/()]+$/.test(s)) return null;
  if (/[+\-*/.]{3,}/.test(s)) return null;
  try {
    const v = Function('"use strict";return (' + s + ')')();
    return (typeof v === 'number' && isFinite(v)) ? v : null;
  } catch { return null; }
}

// A single "a op b" with whole operands (1-100) and a whole result -> animate
// the two blocks walking in and combining. Returns {a,op,b,result} or null.
function parseBinary(raw) {
  let s = String(raw).trim().toLowerCase()
    .replace(/×/g, '*').replace(/÷/g, '/').replace(/x/g, '*').replace(/\s+/g, '');
  const m = s.match(/^(\d+)([+\-*/])(\d+)$/);
  if (!m) return null;
  const a = parseInt(m[1], 10), b = parseInt(m[3], 10), op = m[2];
  if (a < 1 || a > 100 || b < 1 || b > 100) return null;
  let result;
  switch (op) { case '+': result = a+b; break; case '-': result = a-b; break;
    case '*': result = a*b; break; case '/': result = a/b; break; }
  if (!Number.isInteger(result) || result < 1) return null;
  const sym = op === '*' ? '×' : op === '/' ? '÷' : op;
  return { a, b, op: sym, opRaw: op, result };
}

// Equations: "a op b = c" (combine/subtract) or "c = a + b" (split). Returns a
// descriptor or null. Splits only make sense for addition.
function parseEquation(raw) {
  let s = String(raw).trim().toLowerCase()
    .replace(/×/g, '*').replace(/÷/g, '/').replace(/x/g, '*').replace(/\s+/g, '');
  const m = s.match(/^([^=]+)=([^=]+)$/);
  if (!m) return null;
  const numRe = /^\d+$/, binRe = /^(\d+)([+\-*/])(\d+)$/;
  const doOp = (bm) => { const a = +bm[1], b = +bm[3], op = bm[2];
    const r = op === '+' ? a+b : op === '-' ? a-b : op === '*' ? a*b : a/b; return { a, b, op, r }; };
  if (numRe.test(m[1]) && binRe.test(m[2])) {         // total = a + b  -> split
    const e = doOp(m[2].match(binRe));
    if (e.op !== '+' || +m[1] !== e.r) return null;
    if (e.a < 1 || e.b < 1 || e.a > 100 || e.b > 100 || +m[1] > 200) return null;
    return { type: 'split', total: +m[1], a: e.a, b: e.b, op: '+' };
  }
  if (numRe.test(m[2]) && binRe.test(m[1])) {         // a op b = c  -> combine/subtract
    const e = doOp(m[1].match(binRe));
    if (!Number.isInteger(e.r) || e.r < 1 || +m[2] !== e.r) return null;
    if (e.a < 1 || e.b < 1 || e.a > 100 || e.b > 100) return null;
    return { type: 'op', a: e.a, b: e.b, op: e.op, result: e.r,
      sym: e.op === '*' ? '×' : e.op === '/' ? '÷' : e.op };
  }
  return null;
}

const MAX_WHOLE = 1000, MAX_MIXED = 50;
// Returns { mode:'whole'|'decimal'|'mixed', k?, whole?, n?, exact } or null.
function routeValue(val) {
  if (val == null || !isFinite(val) || val < 0) return null;
  if (val < 1) {
    let n = Math.round(val * 100);
    if (n >= 100) return { mode: 'whole', k: 1, exact: true };
    return { mode: 'decimal', n, exact: Math.abs(val * 100 - n) < 1e-9 };
  }
  let whole = Math.floor(val + 1e-9);
  let n = Math.round((val - whole) * 100);
  if (n >= 100) { whole += 1; n = 0; }
  if (n === 0) {  // integer
    if (whole > MAX_WHOLE) whole = MAX_WHOLE;
    return { mode: 'whole', k: whole, exact: true };
  }
  // mixed number: whole + n hundredths (shown as whole blocks + a fractional block)
  const exact = Math.abs((val - whole) * 100 - n) < 1e-9;
  if (whole > MAX_MIXED) return { mode: 'whole', k: Math.min(whole, MAX_WHOLE), exact: false };
  return { mode: 'mixed', whole, n, exact };
}

// ===================== SHARED HELPERS =====================
function gcd(a, b) { return b === 0 ? a : gcd(b, a % b); }
function fmtDecimal(n) { return n === 0 ? '0' : '0.' + String(n).padStart(2, '0'); }
function fmtMixed(whole, n) { return String(whole) + (n / 100).toString().slice(1); } // 1 + .5 -> "1.5"
function faceHTML(single) {
  return single
    ? `<div class="nb-face"><div class="nb-eye nb-eye-single"></div><div class="nb-mouth"></div></div>`
    : `<div class="nb-face"><div class="nb-eye nb-eye-left"></div><div class="nb-eye nb-eye-right"></div><div class="nb-mouth"></div></div>`;
}

const QUADRANTS = [
  { c0:0,c1:4,r0:0,r1:4 }, { c0:0,c1:4,r0:5,r1:9 },
  { c0:5,c1:9,r0:0,r1:4 }, { c0:5,c1:9,r0:5,r1:9 },
];
// Returns ordered [{col,row,cat}], with .isQuarter flag for 25/50/75/100.
function buildFillPlan(n) {
  const plan = [];
  if (n > 0 && n % 25 === 0) {
    for (let q = 0; q < n / 25; q++) {
      const Q = QUADRANTS[q];
      for (let col = Q.c0; col <= Q.c1; col++)
        for (let row = Q.r0; row <= Q.r1; row++) plan.push({ col, row, cat: 'quarter' });
    }
    plan.isQuarter = true; return plan;
  }
  const fullCols = Math.floor(n / 10), rem = n % 10;
  for (let col = 0; col < fullCols; col++)
    for (let row = 0; row < 10; row++) plan.push({ col, row, cat: 'tenth' });
  for (let row = 0; row < rem; row++) plan.push({ col: fullCols, row, cat: 'hundredth' });
  return plan;
}

// ===================== WHOLE-NUMBER RENDER (a Numberblock you can re-shape) =====================
function mkCell(cs, style) {
  const cell = document.createElement('div');
  cell.className = 'wcell';
  cell.style.width = cs + 'px'; cell.style.height = cs + 'px';
  cell.style.background = style.bg;
  if (style.border) cell.style.borderColor = style.border;
  return cell;
}
// Build number n in the given shape into `box`. Returns { cells }.
function buildShape(box, n, shape, cs) {
  box.innerHTML = '';
  const cells = []; let topLeft = null;
  if (shape.kind === 'place') {
    box.style.display = 'flex'; box.style.alignItems = 'flex-end'; box.style.justifyContent = 'center'; box.style.gap = '10px';
    let gi = 0;
    getPlaceParts(n).forEach((p, pi) => {
      const g = document.createElement('div'); g.className = 'wgrid'; g.style.gap = '2px';
      const { cols, rows } = placeDims(p);
      g.style.gridTemplateColumns = `repeat(${cols}, ${cs}px)`;
      g.style.gridTemplateRows = `repeat(${rows}, ${cs}px)`;
      for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++) {
        const cell = mkCell(cs, unitStyle(n, gi, r, c));
        cell.style.gridRow = rows - r; cell.style.gridColumn = c + 1;
        if (pi === 0 && rows - r === 1 && c === 0) topLeft = cell;
        g.appendChild(cell); cells.push(cell); gi++;
      }
      box.appendChild(g);
    });
  } else {
    box.style.display = 'grid'; box.style.gap = '2px'; box.style.alignItems = ''; box.style.justifyContent = 'center';
    const { rows, cols } = shape;
    box.style.gridTemplateColumns = `repeat(${cols}, ${cs}px)`;
    box.style.gridTemplateRows = `repeat(${rows}, ${cs}px)`;
    let i = 0;
    for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++) {
      const cell = mkCell(cs, unitStyle(n, i, r, c));
      cell.style.gridRow = rows - r; cell.style.gridColumn = c + 1;
      if (rows - r === 1 && c === 0) topLeft = cell;
      box.appendChild(cell); cells.push(cell); i++;
    }
  }
  if (topLeft) { topLeft.style.overflow = 'visible'; topLeft.innerHTML = faceHTML(n === 1); }
  return { cells };
}
function fitCellSize(n, shape) {
  const { cols, rows, gaps } = shapeDims(n, shape);
  const availW = stageWrap.clientWidth * 0.9, availH = stageWrap.clientHeight * 0.82;
  let cs = Math.floor(Math.min((availW - gaps) / Math.max(cols, 1), availH / Math.max(rows, 1)));
  return Math.max(4, Math.min(cs, 46));
}
function shapeText(n, shape) {
  const hint = shape.__count > 1 ? ' &nbsp;<span style="opacity:.7">(tap the block to re-shape)</span>' : '';
  if (shape.kind === 'place') {
    const parts = getPlaceParts(n);
    subtitleEl.innerHTML = `<b>${n}</b> in place value: ${parts.map(p => p.value).join(' + ')}${hint}`;
    breakEl.innerHTML = parts.map(p => {
      const cls = p.kind === 'hundreds' ? 'p' : p.kind === 'tens' ? 't' : 'h';
      const unit = p.kind === 'hundreds' ? 'hundred' : p.kind === 'tens' ? 'ten' : 'one';
      return `<span class="${cls}">${p.digit} ${unit}${p.digit > 1 ? 's' : ''}</span>`;
    }).join(' + ');
  } else if (n === 1) {
    subtitleEl.innerHTML = 'This is <b>One</b> — a single block.';
    breakEl.innerHTML = '';
  } else if (shape.cols >= 2 && shape.rows >= 2) {
    subtitleEl.innerHTML = shape.cols === shape.rows
      ? `<b>${n}</b> — a perfect <b>${shape.cols}×${shape.rows}</b> square!${hint}`
      : `<b>${n}</b> — a <b>${shape.cols}×${shape.rows}</b> rectangle.${hint}`;
    breakEl.innerHTML = `<span class="p">${shape.cols} × ${shape.rows} = ${n}</span>`;
  } else {
    subtitleEl.innerHTML = `<b>${n}</b> — a line of ${n}.${hint}`;
    breakEl.innerHTML = '';
  }
}

let current = null;   // { n, shapes, si, box } for click-to-rotate

function drawCurrent(animate, tk) {
  const { n, shapes, si, box } = current;

  const cs = fitCellSize(n, shape);

  if (animate) {

    cells.forEach((cell, i) => setTimeout(() => { if (!tk || tk === token) cell.classList.add('show'); }, 30 + i * step));
  } else {
    cells.forEach(c => c.classList.add('show'));

  shapeText(n, shape);
  return cells.length;
}

// Subtraction: a and b dance in; b lays over a, the overlap vanishes, leaving
// the (often crooked) answer behind. e.g. 10 - 3 leaves a crooked 7.
async function runSubtract(a, b, result) {
  token++; const tk = token;
  showWholeStage(); wholeEl.innerHTML = '';
  wholeEl.style.display = 'flex'; wholeEl.style.alignItems = 'center';
  wholeEl.style.justifyContent = 'center'; wholeEl.style.gap = '46px';
  divided = false; mode = 'subtract';
  decimalEl.textContent = `${a} − ${b}`;
  fractionEl.innerHTML = ''; breakEl.innerHTML = '';
  serverLog({ type: 'demo', kind: 'subtract', value: `${a}-${b}=${result}` });

  const shA = allShapes(a), shB = allShapes(b);
  const shapeA = shA[defaultShapeIndex(a, shA)], shapeB = shB[defaultShapeIndex(b, shB)];
  const cs = Math.min(fitCellSize(a, shapeA), fitCellSize(b, shapeB), 40);

  const boxA = document.createElement('div');
  const boxB = document.createElement('div');
  boxB.style.transition = 'transform 0.7s ease, opacity 0.5s ease';
  wholeEl.append(boxA, boxB);
  const { cells: cellsA } = buildShape(boxA, a, shapeA, cs);
  const { cells: cellsB } = buildShape(boxB, b, shapeB, cs);

  cellsA.forEach((c, i) => setTimeout(() => { if (tk === token) c.classList.add('show'); }, 20 + i * 14));
  subtitleEl.innerHTML = `Here's <b>${a}</b>...`;
  if (!(await sleep(20 + cellsA.length * 14 + 350, tk))) return;

  subtitleEl.innerHTML = `...now take away <b>${b}</b>`;
  boxB.classList.add('walk-in-right');
  cellsB.forEach(c => c.classList.add('show'));
  if (!(await sleep(1550, tk))) return;

  // b lays over the top `b` blocks of a
  const removed = cellsA.slice(a - b);
  removed.forEach(c => c.classList.add('subtracted'));
  boxB.style.transform = `translateX(-${Math.round(boxA.offsetWidth / 2 + 24)}px)`;
  boxB.style.opacity = '0';
  subtitleEl.innerHTML = `<b>${b}</b> takes ${b} block${b > 1 ? 's' : ''} away...`;
  if (!(await sleep(560, tk))) return;

  removed.forEach(c => { c.style.transition = 'opacity 0.4s, transform 0.4s';
    c.style.opacity = '0'; c.style.transform = 'scale(0.15)'; });
  if (!(await sleep(480, tk))) return;
  boxB.remove();

  // move the face to the top-left of what's left (the crooked answer)
  cellsA.forEach(c => { if (c.querySelector('.nb-face')) c.innerHTML = ''; });
  const remain = cellsA.filter(c => !c.classList.contains('subtracted'));
  let faceCell = null, bestRow = 1e9, bestCol = 1e9;
  remain.forEach(c => { const gr = +c.style.gridRow, gc = +c.style.gridColumn;
    if (gr < bestRow || (gr === bestRow && gc < bestCol)) { bestRow = gr; bestCol = gc; faceCell = c; } });
  if (faceCell) { faceCell.style.overflow = 'visible'; faceCell.innerHTML = faceHTML(result === 1); }
  boxA.classList.add('dancing');
  subtitleEl.innerHTML = `<b>${a} − ${b} = ${result}</b>!`;
  fractionEl.innerHTML = `<span class="frac">${a} − ${b}</span><span class="eq">=</span><span class="reduced">${result}</span>`;
}

// Equation split: total dances in, then splits into "a + b". e.g. 3 = 1 + 2.
async function runSplit(total, a, opSym, b) {
  token++; const tk = token;
  showCombineStage(); combineEl.innerHTML = '';
  divided = false; mode = 'combine';
  decimalEl.textContent = `${total} = ${a} ${opSym} ${b}`;
  fractionEl.innerHTML = ''; breakEl.innerHTML = '';
  serverLog({ type: 'demo', kind: 'split', value: `${total}=${a}${opSym}${b}` });

  const whole = mkOperand(); whole.l.textContent = total;
  combineEl.append(whole.w);
  renderMini(whole.g, total); whole.w.classList.add('walk-in-left');
  subtitleEl.innerHTML = `Here's <b>${total}</b>...`;
  if (!(await sleep(1500, tk))) return;

  subtitleEl.innerHTML = `Watch <b>${total}</b> split apart...`;
  combineEl.innerHTML = '';
  const left = mkOperand(), right = mkOperand();
  left.l.textContent = a; right.l.textContent = b;
  const sym = document.createElement('div'); sym.className = 'op-sym'; sym.textContent = opSym;
  combineEl.append(left.w, sym, right.w);
  renderMini(left.g, a); renderMini(right.g, b);
  // start pulled together, then slide apart
  left.w.style.transform = 'translateX(60px) scale(0.85)'; left.w.style.opacity = '0.25';
  right.w.style.transform = 'translateX(-60px) scale(0.85)'; right.w.style.opacity = '0.25';
  requestAnimationFrame(() => {
    left.w.style.transition = 'transform 0.8s cubic-bezier(0.34,1.4,0.64,1), opacity 0.5s';
    right.w.style.transition = left.w.style.transition;
    left.w.style.transform = ''; left.w.style.opacity = '1';
    right.w.style.transform = ''; right.w.style.opacity = '1';
    sym.classList.add('show');
  });
  if (!(await sleep(900, tk))) return;
  subtitleEl.innerHTML = `<b>${total} = ${a} ${opSym} ${b}</b>!`;
  fractionEl.innerHTML = `<span class="frac">${total}</span><span class="eq">=</span>` +
    `<span class="reduced">${a} ${opSym} ${b}</span>`;
}

// ===================== MIXED-NUMBER RENDER (whole + fractional block) =====================
function buildUnitSquare(size, opts) {
  // opts: { solid:true } | { n:hundredths } ; face:boolean
  const unit = document.createElement('div');
  unit.className = 'unit' + (opts.solid ? ' solid' : '');
  unit.style.width = size + 'px'; unit.style.height = size + 'px';
  if (opts.solid) {
    if (opts.face) { unit.style.overflow = 'visible'; unit.innerHTML = faceHTML(true); }
  } else {
    const g = document.createElement('div'); g.className = 'unit-grid';
    g.style.width = size + 'px'; g.style.height = size + 'px';
    const map = {};
    for (let col = 0; col < 10; col++)
      for (let row = 0; row < 10; row++) {
        const c = document.createElement('div'); c.className = 'ucell';
        c.style.gridColumn = col + 1; c.style.gridRow = 10 - row;
        g.appendChild(c); map[col + ',' + row] = c;
      }
    for (const p of buildFillPlan(opts.n)) map[p.col + ',' + p.row].className = 'ucell ' + p.cat;
    unit.appendChild(g);
    if (opts.face) { const f = document.createElement('div'); f.innerHTML = faceHTML(true);
      f.firstChild.style.zIndex = 5; unit.appendChild(f.firstChild); unit.style.overflow = 'visible'; }
  }
  return unit;
}

async function renderMixed(whole, n, exact) {
  token++; const tk = token;
  showWholeStage();
  wholeEl.innerHTML = ''; wholeEl.style.display = 'flex'; wholeEl.style.alignItems = 'center';
  wholeEl.style.justifyContent = 'center'; wholeEl.style.gap = '0';
  divided = false; mode = 'mixed';
  const disp = fmtMixed(whole, n);
  decimalEl.textContent = disp;
  serverLog({ type: 'demo', kind: 'mixed', value: disp });

  // (whole) solid unit blocks + 1 fractional block, laid out as a grid so any
  // count fits: a single row for a few, a near-square grid for many (e.g. 13.5).
  const count = whole + 1;
  const cols = count <= 5 ? count : Math.ceil(Math.sqrt(count));
  const rows = Math.ceil(count / cols);
  const availW = stageWrap.clientWidth * 0.95, availH = stageWrap.clientHeight * 0.82;
  let S = Math.floor(Math.min((availW - (cols - 1) * 10) / cols, (availH - (rows - 1) * 10) / rows));
  S = Math.max(42, Math.min(S, 260));

  const gridWrap = document.createElement('div');
  gridWrap.className = 'dancing';
  gridWrap.style.display = 'grid';
  gridWrap.style.gridTemplateColumns = `repeat(${cols}, ${S}px)`;
  gridWrap.style.gap = '10px';
  gridWrap.style.justifyItems = 'center'; gridWrap.style.alignItems = 'center';
  wholeEl.appendChild(gridWrap);

  const units = [];
  for (let i = 0; i < count; i++) {
    const isFrac = (i === count - 1);
    const u = isFrac ? buildUnitSquare(S, { n, face: false })
                     : buildUnitSquare(S, { solid: true, face: i === 0 });
    if (isFrac) { const lbl = document.createElement('div'); lbl.className = 'ulabel';
      lbl.textContent = fmtDecimal(n); u.appendChild(lbl); }
    gridWrap.appendChild(u); units.push(u);
  }

  const step = count > 8 ? 70 : 150;
  units.forEach((u, i) => setTimeout(() => { if (tk === token) u.classList.add('show'); }, 50 + i * step));
  if (!(await sleep(50 + count * step + 200, tk))) return;

  const g = gcd(n, 100), rn = n / g, rd = 100 / g;
  subtitleEl.innerHTML = `<b>${whole}</b> whole block${whole > 1 ? 's' : ''} and <b>${fmtDecimal(n)}</b> of one more`;
  if (!exact) subtitleEl.innerHTML += ` <span style="opacity:.85">(rounded to the nearest hundredth)</span>`;
  fractionEl.innerHTML = `<span class="frac">${disp}</span><span class="eq">=</span>` +
    `<span class="reduced">${whole} ${rn}/${rd}</span>`;
  breakEl.innerHTML = `<span class="p">${whole} whole${whole > 1 ? 's' : ''}</span> + ` +
    `<span class="h">${n} hundredth${n > 1 ? 's' : ''}</span>`;
}

// ===================== ROUTER =====================
// Combine "a op b" animates; everything else routes to whole / mixed / decimal.
async function present(raw) {
  const eq = parseEquation(raw);
  if (eq) {
    if (eq.type === 'split') await runSplit(eq.total, eq.a, eq.op, eq.b);
    else if (eq.op === '-') await runSubtract(eq.a, eq.b, eq.result);
    else await runCombine(eq.a, eq.sym, eq.b, eq.result);
    return;
  }
  const combo = parseBinary(raw);
  if (combo) {
    if (combo.opRaw === '-') await runSubtract(combo.a, combo.b, combo.result);
    else await runCombine(combo.a, combo.op, combo.b, combo.result);
    return;
  }
  const r = routeValue(evalExpr(raw));
  if (!r) { subtitleEl.textContent = 'Try 102, 1.5, 1+2, 10-3, or 3=1+2'; return; }
  if (r.mode === 'whole') await renderWhole(r.k, r.exact);
  else if (r.mode === 'mixed') await renderMixed(r.whole, r.n, r.exact);
  else await demonstrateDecimal(r.n, r.exact);
}
function handle(raw) { stopTour(); present(raw); }

function backToOne() {
  token++; mode = 'idle';
  showSquareStage(); resetSquareToOne(); sizeSquare();
  decimalEl.textContent = '1';
  fractionEl.innerHTML = ''; breakEl.innerHTML = '';
  subtitleEl.innerHTML = 'Type a number — a whole number like <b>102</b>, a decimal like <b>0.42</b>, or a mix like <b>1.5</b>.';
}

// ===================== TOUR =====================
const TOUR = ['0.5', '0.25', '7', '25', '34', '102', '1+2', '10-3', '3=1+2', '1.5', '0.33'];
let tourRunning = false, tourTimer = null;
async function runTour() {
  const btn = document.getElementById('tour-btn');
  tourRunning = true; btn.classList.add('on'); btn.textContent = '■ Stop';
  let i = 0;
  while (tourRunning) {
    await present(TOUR[i % TOUR.length]);
    if (!tourRunning) break;
    await new Promise(res => { tourTimer = setTimeout(res, 2600); });
    i++;
  }
}
function stopTour() {
  tourRunning = false; if (tourTimer) clearTimeout(tourTimer);
  const btn = document.getElementById('tour-btn'); btn.classList.remove('on'); btn.textContent = '▶ Tour';
}

// ===================== WIRING =====================
document.querySelectorAll('.chip[data-v]').forEach(btn =>
  btn.addEventListener('click', () => handle(btn.dataset.v)));
document.getElementById('tour-btn').addEventListener('click', () => { tourRunning ? stopTour() : runTour(); });
document.getElementById('reset-btn').addEventListener('click', () => { stopTour(); backToOne(); });
function submitInput() {
  const raw = document.getElementById('num-input').value.trim();
  if (raw === '') return;
  if (parseEquation(raw) == null && parseBinary(raw) == null && evalExpr(raw) == null) {
    subtitleEl.textContent = 'Hmm — try 102, 1.5, 1+2, 10-3, or 3=1+2'; return;
  }
  handle(raw);
}
document.getElementById('go').addEventListener('click', submitInput);
document.getElementById('num-input').addEventListener('keydown', e => { if (e.key === 'Enter') submitInput(); });
// Tap a decimal to expand it again (re-grow One into the 100-grid).
square.addEventListener('click', () => { if (mode === 'decimal') { stopTour(); demonstrateDecimal(currentDecimalN, true); } });

let rT = null;
window.addEventListener('resize', () => { clearTimeout(rT); rT = setTimeout(sizeSquare, 150); });
sizeSquare();
</script>
