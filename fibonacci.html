<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Fibonacci Sequence</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #202124;
        --paper: #fffdf8;
        --panel: #ffffff;
        --red: #e43d30;
        --blue: #2878d4;
        --green: #178b58;
        --yellow: #f7c948;
        --orange: #f28b30;
        --purple: #8b5ac7;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          linear-gradient(90deg, rgba(23, 139, 88, 0.06) 0 25%, transparent 25% 100%),
          linear-gradient(180deg, rgba(247, 201, 72, 0.08), rgba(40, 120, 212, 0.07)),
          var(--paper);
        color: var(--ink);
        font-family: Arial, Helvetica, sans-serif;
      }

      main {
        width: min(1180px, calc(100% - 32px));
        margin: 0 auto;
        padding: 28px 0 40px;
      }

      header {
        display: grid;
        gap: 8px;
        margin-bottom: 24px;
      }

      h1 {
        margin: 0;
        font-size: clamp(2.1rem, 5vw, 4.8rem);
        line-height: 0.95;
        letter-spacing: 0;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
        gap: 16px;
      }

      .card {
        --accent: var(--blue);
        display: grid;
        grid-template-rows: auto 1fr;
        min-height: 360px;
        overflow: hidden;
        border: 2px solid color-mix(in srgb, var(--accent), #ffffff 40%);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: 0 10px 26px rgba(32, 33, 36, 0.08);
        color: inherit;
        text-decoration: none;
      }

      .image-stage {
        display: grid;
        place-items: center;
        min-height: 220px;
        padding: 18px;
        background:
          linear-gradient(135deg, color-mix(in srgb, var(--accent), #ffffff 82%), #ffffff);
      }

      .image-stage img {
        display: block;
        width: auto;
        height: auto;
        max-width: 100%;
        max-height: 210px;
        object-fit: contain;
        filter: drop-shadow(0 8px 10px rgba(32, 33, 36, 0.15));
      }

      .card-body {
        display: grid;
        align-content: start;
        gap: 8px;
        padding: 14px 16px 16px;
      }

      .notation {
        display: flex;
        align-items: baseline;
        gap: 8px;
        flex-wrap: wrap;
        font-weight: 800;
      }

      .power {
        color: var(--accent);
        font-size: 1.1rem;
        line-height: 1;
      }

      .equals {
        color: var(--ink);
        font-size: 1.15rem;
      }

      .value {
        font-size: 2.4rem;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      @media (max-width: 560px) {
        main {
          width: min(100% - 20px, 1180px);
          padding-top: 18px;
        }

        .grid {
          grid-template-columns: 1fr;
        }

        .card {
          min-height: 320px;
        }
      }

      @media print {
        @page {
          size: landscape;
          margin: 0.45in;
        }

        body {
          background: #fff;
        }

        main {
          width: 100%;
          padding: 0;
          -webkit-print-color-adjust: exact;
          print-color-adjust: exact;
        }

        header {
          margin-bottom: 12px;
        }

        h1 {
          font-size: 28pt;
        }

        .grid {
          grid-template-columns: repeat(5, 1fr);
          gap: 10px;
        }

        .card {
          min-height: 0;
          border-color: #bbb;
          box-shadow: none;
          break-inside: avoid;
          page-break-inside: avoid;
        }

        .image-stage {
          min-height: 135px;
          padding: 10px;
          background: #fff;
        }

        .image-stage img {
          max-height: 130px;
          filter: none;
        }

        .card-body {
          gap: 4px;
          padding: 8px 10px 10px;
        }

        .power {
          font-size: 10pt;
        }

        .equals {
          font-size: 10pt;
        }

        .value {
          font-size: 22pt;
        }

        a[href]::after {
          content: none !important;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Fibonacci Sequence</h1>
      </header>

      <section class="grid" aria-label="First ten Fibonacci Numberblocks">
        <a class="card" href="https://numberblocks.fandom.com/wiki/One_(character)" style="--accent: var(--red)" aria-label="Numberblock One source">
          <div class="image-stage">
            <img src="assets/numberblocks/001-one.webp" alt="Numberblock One">
          </div>
          <div class="card-body">
            <div class="notation"><span class="power">F1</span><span class="equals">=</span><span class="value">1</span></div>
          </div>
        </a>

        <a class="card" href="https://numberblocks.fandom.com/wiki/One_(character)" style="--accent: var(--red)" aria-label="Numberblock One source">
          <div class="image-stage">
            <img src="assets/numberblocks/001-one.webp" alt="Numberblock One">
          </div>
          <div class="card-body">
            <div class="notation"><span class="power">F2</span><span class="equals">=</span><span class="value">1</span></div>
          </div>
        </a>

        <a class="card" href="https://numberblocks.fandom.com/wiki/Two_(character)" style="--accent: var(--orange)" aria-label="Numberblock Two source">
          <div class="image-stage">
            <img src="assets/numberblocks/002-two.webp" alt="Numberblock Two">
          </div>
          <div class="card-body">
            <div class="notation"><span class="power">F3</span><span class="equals">=</span><span class="value">2</span></div>
          </div>
        </a>

        <a class="card" href="https://numberblocks.fandom.com/wiki/Three_(character)" style="--accent: var(--yellow)" aria-label="Numberblock Three source">
          <div class="image-stage">
            <img src="assets/numberblocks/003-three.webp" alt="Numberblock Three">
          </div>
          <div class="card-body">
            <div class="notation"><span class="power">F4</span><span class="equals">=</span><span class="value">3</span></div>
          </div>
        </a>

        <a class="card" href="https://numberblocks.fandom.com/wiki/Five_(character)" style="--accent: var(--blue)" aria-label="Numberblock Five source">
          <div class="image-stage">
            <img src="assets/numberblocks/005-five.webp" alt="Numberblock Five">
          </div>
          <div class="card-body">
            <div class="notation"><span class="power">F5</span><span class="equals">=</span><span class="value">5</span></div>
          </div>
        </a>

        <a class="card" href="https://numberblocks.fandom.com/wiki/Eight_(character)" style="--accent: var(--purple)" aria-label="Numberblock Eight source">
          <div class="image-stage">
            <img src="assets/numberblocks/008-eight.webp" alt="Numberblock Eight">
          </div>
          <div class="card-body">
            <div class="notation"><span class="power">F6</span><span class="equals">=</span><span class="value">8</span></div>
          </div>
        </a>

        <a class="card" href="https://numberblocks.fandom.com/wiki/Thirteen_(character)" style="--accent: var(--red)" aria-label="Numberblock Thirteen source">
          <div class="image-stage">
            <img src="assets/numberblocks/013-thirteen.webp" alt="Numberblock Thirteen">
          </div>
          <div class="card-body">
            <div class="notation"><span class="power">F7</span><span class="equals">=</span><span class="value">13</span></div>
          </div>
        </a>

        <a class="card" href="https://numberblocks.fandom.com/wiki/Twenty-One" style="--accent: var(--orange)" aria-label="Numberblock Twenty-One source">
          <div class="image-stage">
            <img src="assets/numberblocks/021-twenty-one.webp" alt="Numberblock Twenty-One">
          </div>
          <div class="card-body">
            <div class="notation"><span class="power">F8</span><span class="equals">=</span><span class="value">21</span></div>
          </div>
        </a>

        <a class="card" href="https://numberblocks.fandom.com/wiki/Thirty-Four" style="--accent: var(--green)" aria-label="Numberblock Thirty-Four source">
          <div class="image-stage">
            <img src="assets/numberblocks/034-thirty-four.webp" alt="Numberblock Thirty-Four">
          </div>
          <div class="card-body">
            <div class="notation"><span class="power">F9</span><span class="equals">=</span><span class="value">34</span></div>
          </div>
        </a>

        <a class="card" href="https://numberblocks.fandom.com/wiki/Fifty-Five" style="--accent: var(--blue)" aria-label="Numberblock Fifty-Five source">
          <div class="image-stage">
            <img src="assets/numberblocks/055-fifty-five.webp" alt="Numberblock Fifty-Five">
          </div>
          <div class="card-body">
            <div class="notation"><span class="power">F10</span><span class="equals">=</span><span class="value">55</span></div>
          </div>
        </a>
      </section>
    </main>
  </body>
</html>
