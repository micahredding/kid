<script>
// ===================== GAMES =====================

const GAMES = {
  'numberblocks':    '/numberblocks/',
  'planets':         '/planets/',
  'run-around':      '/run-around/',
  'letter-invaders': '/letter-invaders/',
};

function tryLaunchGame(trimmed) {
  const key = trimmed.toLowerCase();
  if (key === 'games') {
    addLine('Games you can play:', 'system');
    for (const name of Object.keys(GAMES)) addLine(`  ${name}`, 'system');
    serverLog({ type: 'input', raw: trimmed, display: '[list games]' });
    return true;
  }
  if (!(key in GAMES)) return false;
  window.open(GAMES[key], '_blank');
  return true;
}

// ===================== SERVER BRIDGE =====================
// Fire-and-forget: works whether or not the server is running.

// Use same-origin so this works from other devices on the LAN (not just the host machine).
const SERVER = window.location.origin;

function serverLog(entry) {
  fetch(`${SERVER}/log`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(entry),
  }).catch(() => { /* server not running — silently skip */ });
}

async function serverSaveDrawing(dataUrl) {
  try {
    const res = await fetch(`${SERVER}/save-drawing`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ dataUrl }),
    });
    if (res.ok) {
      const { filepath } = await res.json();
      return filepath;
    }
  } catch { /* server not running */ }
  return null;
}

// ===================== COLORS =====================

const COLORS = {
  red:     { name: 'red',     rgb: [255, 0, 0] },
  blue:    { name: 'blue',    rgb: [0, 0, 255] },
  yellow:  { name: 'yellow',  rgb: [255, 255, 0] },
  green:   { name: 'green',   rgb: [0, 160, 0] },
  orange:  { name: 'orange',  rgb: [255, 165, 0] },
  purple:  { name: 'purple',  rgb: [128, 0, 128] },
  pink:    { name: 'pink',    rgb: [255, 192, 203] },
  brown:   { name: 'brown',   rgb: [139, 69, 19] },
  black:   { name: 'black',   rgb: [0, 0, 0] },
  white:   { name: 'white',   rgb: [255, 255, 255] },
  gray:    { name: 'gray',    rgb: [128, 128, 128] },
  grey:    { name: 'grey',    rgb: [128, 128, 128] },
  cyan:    { name: 'cyan',    rgb: [0, 255, 255] },
  magenta: { name: 'magenta', rgb: [255, 0, 255] },
};

const MIX_TABLE = {
  'red+blue': 'purple',    'blue+red': 'purple',
  'red+yellow': 'orange',  'yellow+red': 'orange',
  'blue+yellow': 'green',  'yellow+blue': 'green',
  'red+white': 'pink',     'white+red': 'pink',
  'red+green': 'brown',    'green+red': 'brown',
  'black+white': 'gray',   'white+black': 'gray',
  'blue+white': 'cyan',    'white+blue': 'cyan',
  'red+blue+yellow': 'brown',
  'purple+yellow': 'brown', 'yellow+purple': 'brown',
  'orange+blue': 'brown',  'blue+orange': 'brown',
  'pink+blue': 'purple',   'blue+pink': 'purple',
};

const COLOR_CYCLE = [
  COLORS.red, COLORS.orange, COLORS.yellow, COLORS.green,
  COLORS.blue, COLORS.purple, COLORS.pink, COLORS.white,
  COLORS.cyan, COLORS.brown, COLORS.black, COLORS.gray,
];

function isColor(token) { return token.toLowerCase() in COLORS; }
function getColor(token) { return COLORS[token.toLowerCase()] || null; }
function rgbStr([r, g, b]) { return `rgb(${r},${g},${b})`; }

function rgbToCmyk([r, g, b]) {
  const r1 = r/255, g1 = g/255, b1 = b/255;
  const k = 1 - Math.max(r1, g1, b1);
  if (k >= 1) return [0, 0, 0, 1];
  return [(1-r1-k)/(1-k), (1-g1-k)/(1-k), (1-b1-k)/(1-k), k];
}
function cmykToRgb([c, m, y, k]) {
  return [
    Math.round(255*(1-c)*(1-k)),
    Math.round(255*(1-m)*(1-k)),
    Math.round(255*(1-y)*(1-k)),
  ];
}
function mixColors(color1, color2) {
  if (color1.name && color2.name) {
    const key = `${color1.name}+${color2.name}`;
    if (MIX_TABLE[key]) return { ...COLORS[MIX_TABLE[key]] };
  }
  const cm1 = rgbToCmyk(color1.rgb), cm2 = rgbToCmyk(color2.rgb);
  return { name: null, rgb: cmykToRgb(cm1.map((v, i) => (v + cm2[i]) / 2)) };
}

// ===================== KEYWORDS =====================

const KEYWORDS = {

  "ninja":"🥷","pirate":"🏴‍☠️","superhero":"🦸","fairy":"🧚","mermaid":"🧜","wizard":"🧙",
  "vampire":"🧛","zombie":"🧟","earth":"🌍","world":"🌍","planet":"🪐","comet":"☄️",
  "ufo":"🛸","paw":"🐾","footprint":"👣","egg":"🥚","chick":"🐥","duckling":"🐤",
  "duck":"🦆","owl":"🦉","bat":"🦇","fox":"🦊","rabbit":"🐰","bunny":"🐰","mouse":"🐭",
  "hamster":"🐹","panda":"🐼","koala":"🐨","tiger":"🐯","wolf":"🐺","gorilla":"🦍",
  "deer":"🦌","giraffe":"🦒","zebra":"🦓","hippo":"🦛","crocodile":"🐊","lizard":"🦎",
  "scorpion":"🦂","snail":"🐌","ladybug":"🐞","caterpillar":"🐛","worm":"🪱",
  "jellyfish":"🪼","dolphin":"🐬","blowfish":"🐡","lobster":"🦞","shrimp":"🦐",
  "squid":"🦑","flamingo":"🦩","peacock":"🦚","parrot":"🦜","swan":"🦢","eagle":"🦅",
  "feather":"🪶",
};

function isEmoji(token) { return token.toLowerCase() in KEYWORDS; }
function getEmoji(token) { return KEYWORDS[token.toLowerCase()] || null; }

// ===================== EMOJI ACTIONS =====================

const EMOJI_ACTIONS = {
  jump:   { cls: 'emoji-action--jump' },
  bounce: { cls: 'emoji-action--bounce' },
  spin:   { cls: 'emoji-action--spin' },
  wiggle: { cls: 'emoji-action--wiggle' },
  float:  { cls: 'emoji-action--float' },
  dance:  { cls: 'emoji-action--dance' },
};

const EMOJI_ACTION_ALIASES = {
  jump: 'jump', jumps: 'jump', hopping: 'jump', hop: 'jump',
  bounce: 'bounce', bounces: 'bounce',
  spin: 'spin', spins: 'spin', rotate: 'spin', rotates: 'spin',
  wiggle: 'wiggle', wiggles: 'wiggle', shake: 'wiggle', shakes: 'wiggle',
  float: 'float', floats: 'float',
  dance: 'dance', dances: 'dance',
};

// ===================== SPEECH =====================

function trySayCommand(trimmed) {
  const lower = trimmed.toLowerCase();
  if (!(lower === 'say' || lower.startsWith('say '))) return false;
  const phrase = trimmed.slice(3).trim();
  if (!phrase) {
    addLine('Try: say apple', 'system');
    serverLog({ type: 'input', raw: trimmed, display: '[say help]' });
    return true;
  }

  if (!('speechSynthesis' in window) || typeof window.SpeechSynthesisUtterance !== 'function') {
    addLine('Speech not supported in this browser.', 'system');
    serverLog({ type: 'input', raw: trimmed, display: '[say unsupported]' });
    return true;
  }

  try {
    // Cancel anything already speaking so rapid "say ..." feels responsive.
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(phrase);
    u.lang = 'en-US';
    // Slightly slower, clearer default for kids.
    u.rate = 0.95;
    u.pitch = 1.05;
    window.speechSynthesis.speak(u);

    addLine(`Saying: ${phrase}`, 'system');
    serverLog({
      type: 'input',
      raw: trimmed,
      output: { type: 'say', data: { phrase } },
      display: `[say ${phrase}]`,
    });
  } catch {
    addLine('Could not speak that.', 'system');
    serverLog({ type: 'input', raw: trimmed, display: '[say error]' });
  }
  return true;
}

function tryEmojiAction(trimmed) {
  const parts = trimmed.split(/\s+/).filter(Boolean);
  if (parts.length !== 2) return false;
  const [thing, actionRaw] = parts;
  const emoji = getEmoji(thing);
  if (!emoji) return false;
  const action = EMOJI_ACTION_ALIASES[actionRaw.toLowerCase()];
  if (!action) return false;

  const span = document.createElement('span');
  span.className = `emoji emoji-action ${EMOJI_ACTIONS[action].cls}`;
  span.textContent = emoji;
  addLine(span);
  serverLog({
    type: 'input',
    raw: trimmed,
    output: { type: 'emoji_action', data: { emoji, action } },
    display: `${emoji} ${action}`,
  });
  return true;
}

function tryThemeCommand(trimmed) {
  const theme = trimmed.toLowerCase();
  let color = null;
  if (theme === 'dark') {
    document.body.style.backgroundColor = '';
    document.body.classList.remove('light-mode');
    addLine('Dark background on.', 'system');
    serverLog({ type: 'input', raw: trimmed, display: '[dark background on]' });
    return true;
  }

  if (theme === 'white') {
    color = COLORS.white;
  } else {
    const match = theme.match(/^(.+?)\s+screen$/);
    if (!match) return false;
    const result = evaluate(match[1]);
    if (result.type !== 'color') return false;
    color = result.data;
  }

  const toLinear = (channel) => {
    const value = channel / 255;
    return value <= 0.03928 ? value / 12.92 : ((value + 0.055) / 1.055) ** 2.4;
  };
  const [r, g, b] = color.rgb.map(toLinear);
  const useDarkText = (0.2126 * r + 0.7152 * g + 0.0722 * b) > 0.179;
  document.body.style.backgroundColor = rgbStr(color.rgb);
  document.body.classList.toggle('light-mode', useDarkText);
  const screenName = color.name || matchScreenColorName(color.rgb);
  const display = `[${screenName} screen]`;
  addLine(`${screenName[0].toUpperCase()}${screenName.slice(1)} screen on.`, 'system');
  serverLog({ type: 'input', raw: trimmed, display });
  return true;
}

function matchScreenColorName(rgb) {
  for (const color of Object.values(COLORS)) {
    if (arraysEqual(color.rgb, rgb)) return color.name;
  }
  return 'mixed color';
}

// ===================== VARIABLES =====================

const varStore = new Map();
function getVariable(name) { return varStore.get(name.toLowerCase()) || null; }
function setVariable(name, value) { varStore.set(name.toLowerCase(), value); }
function hasVariable(name) { return varStore.has(name.toLowerCase()); }

// ===================== PARSER =====================

const OPERATORS = new Set(['+', '-', 'x', '*', '/', '÷', '=']);
function isOperator(t) { return OPERATORS.has(t); }
function isNumber(t) { return /^\d+(\.\d+)?$/.test(t); }
function isFraction(t) { return /^\d+(\.\d+)?\/\d+(\.\d+)?$/.test(t); }

function formatNumber(value) {
  return Number.isInteger(value) ? String(value) : String(Number(value.toPrecision(12)));
}

function countDecimalPlaces(value) {
  const text = String(value);
  if (!text.includes('e')) return (text.split('.')[1] || '').length;

  const [coefficient, exponentText] = text.split('e');
  const decimals = (coefficient.split('.')[1] || '').length;
  return Math.max(0, decimals - Number(exponentText));
}

function gcd(a, b) {
  a = Math.abs(a);
  b = Math.abs(b);
  while (b !== 0) {
    const next = a % b;
    a = b;
    b = next;
  }
  return a || 1;
}

function makeFraction(numerator, denominator) {
  const value = denominator === 0 ? numerator : numerator / denominator;
  const originalText = `${formatNumber(numerator)}/${formatNumber(denominator)}`;
  const scale = 10 ** Math.max(countDecimalPlaces(numerator), countDecimalPlaces(denominator));
  let reducedNumerator = Math.round(numerator * scale);
  let reducedDenominator = Math.round(denominator * scale);
  const divisor = gcd(reducedNumerator, reducedDenominator);

  reducedNumerator /= divisor;
  reducedDenominator /= divisor;

  if (reducedDenominator < 0) {
    reducedNumerator *= -1;
    reducedDenominator *= -1;
  }

  if (reducedDenominator === 1) {
    return { type: 'number', data: reducedNumerator };
  }

  return {
    type: 'fraction',
    data: {
      numerator: reducedNumerator,
      denominator: reducedDenominator,
      value,
      originalNumerator: numerator,
      originalDenominator: denominator,
      text: [
        originalText,
        `${formatNumber(reducedNumerator)}/${formatNumber(reducedDenominator)}`,
        formatNumber(value),
      ].filter((part, index, parts) => index === 0 || part !== parts[index - 1]).join(' = '),
    },
  };
}

function numericValue(value) {
  if (value.type === 'number') return value.data;
  if (value.type === 'fraction') return value.data.value;
  return null;
}

function tokenize(line) {
  // Avoid regex lookbehind so this runs on older browsers (e.g. older Safari).
  // Behavior:
  // - Split on +, -, /, ÷, =, *
  // - Treat "x" as multiplication only when it's between digits (e.g. 3x4)
  const raw = line.split(/\s+/).filter(Boolean);
  const result = [];

  const isDigit = (c) => c >= '0' && c <= '9';
  const isAlpha = (c) => (c >= 'A' && c <= 'Z') || (c >= 'a' && c <= 'z');
  const isOp = (c) => c === '+' || c === '-' || c === '/' || c === '÷' || c === '=' || c === '*';

  for (const tok of raw) {
    if (isFraction(tok)) {
      result.push(tok);
      continue;
    }

    let buf = '';
    for (let i = 0; i < tok.length; i++) {
      const ch = tok[i];
      const prev = tok[i - 1];
      const next = tok[i + 1];
      const isXMul = ch === 'x' && isDigit(prev) && isDigit(next);
      const isNumToWordBoundary =
        i > 0 &&
        isAlpha(ch) &&
        (isDigit(prev) || (prev === '.' && i >= 2 && isDigit(tok[i - 2])));

      if (isOp(ch) || isXMul) {
        if (buf) result.push(buf);
        buf = '';
        result.push(ch);
      } else if (isNumToWordBoundary) {
        // Split "2car" => "2", "car" and "2.5car" => "2.5", "car"
        if (buf) result.push(buf);
        buf = ch;
      } else {
        buf += ch;
      }
    }
    if (buf) result.push(buf);
  }
  return result;
}

function resolveToken(token) {
  if (isFraction(token)) {
    const [numerator, denominator] = token.split('/').map(Number);
    return makeFraction(numerator, denominator);
  }
  if (isNumber(token)) return { type: 'number', data: parseFloat(token) };
  if (isColor(token)) return { type: 'color', data: { ...getColor(token) } };
  if (isEmoji(token)) return { type: 'emoji', data: getEmoji(token) };
  if (hasVariable(token)) { const v = getVariable(token); return { ...v }; }
  return { type: 'text', data: token };
}

function arraysEqual(a, b) { return a.length === b.length && a.every((v, i) => v === b[i]); }

function valueToPlainString(v) {
  switch (v.type) {
    case 'number': return String(v.data);
    case 'fraction': return v.data.text;
    case 'text': return v.data;
    case 'emoji': return v.data;
    case 'color': return `[${v.data.name || 'mixed'}]`;
    case 'colored_blocks': return `[${v.data.count}x ${v.data.color.name || 'mixed'}]`;
    default: return String(v.data);
  }
}

function concatenateValues(...values) {
  const flat = [];
  for (const v of values) {
    if (v.type === 'list') flat.push(...v.data);
    else flat.push(v);
  }
  if (flat.every(v => v.type === 'text' || v.type === 'emoji' || v.type === 'number' || v.type === 'fraction')) {
    return { type: 'text', data: flat.map(valueToPlainString).join('') };
  }
  return { type: 'list', data: flat };
}

function applyJuxtaposition(left, right) {
  if (left.type === 'number') {
    const count = Math.max(0, Math.min(Math.floor(left.data), 1000));
    if (right.type === 'color') return { type: 'colored_blocks', data: { count, color: right.data } };
    if (right.type === 'colored_blocks') return { type: 'colored_blocks', data: { count: count * right.data.count, color: right.data.color } };
    if (right.type === 'emoji') return { type: 'emoji', data: right.data.repeat(count) };
    if (right.type === 'text') return { type: 'text', data: Array(count).fill(right.data).join(' ') };
    if (right.type === 'number') return { type: 'text', data: `${left.data} ${right.data}` };
    if (right.type === 'list') {
      const items = [];
      for (let j = 0; j < count; j++) items.push(...right.data);
      return { type: 'list', data: items };
    }
  }
  if (left.type === 'fraction') return concatenateValues(left, right);
  if (left.type === 'color' && right.type === 'number') {
    const count = Math.max(0, Math.min(Math.floor(right.data), 1000));
    return { type: 'colored_blocks', data: { count, color: left.data } };
  }
  return concatenateValues(left, right);
}

function applyOp(left, op, right) {
  if (op === '=') op = '+';
  const leftNumber = numericValue(left);
  const rightNumber = numericValue(right);
  if (leftNumber !== null && rightNumber !== null) {
    switch (op) {
      case '+': return { type: 'number', data: leftNumber + rightNumber };
      case '-': return { type: 'number', data: leftNumber - rightNumber };
      case 'x': case '*': return { type: 'number', data: leftNumber * rightNumber };
      case '/': return makeFraction(leftNumber, rightNumber);
      case '÷': return { type: 'number', data: rightNumber === 0 ? leftNumber : leftNumber / rightNumber };
    }
  }
  if (op === '+' && left.type === 'color' && right.type === 'color')
    return { type: 'color', data: mixColors(left.data, right.data) };
  if (op === '+' && left.type === 'colored_blocks' && right.type === 'color')
    return { type: 'colored_blocks', data: { count: left.data.count, color: mixColors(left.data.color, right.data) } };
  if (op === '+' && left.type === 'colored_blocks' && right.type === 'number')
    return { type: 'colored_blocks', data: { count: left.data.count + right.data, color: left.data.color } };
  if (op === '+' && left.type === 'number' && right.type === 'color')
    return { type: 'colored_blocks', data: { count: left.data, color: right.data } };
  if (op === '+' && left.type === 'number' && right.type === 'colored_blocks')
    return { type: 'colored_blocks', data: { count: left.data + right.data.count, color: right.data.color } };
  if (op === '+' && left.type === 'colored_blocks' && right.type === 'colored_blocks') {
    const color = arraysEqual(left.data.color.rgb, right.data.color.rgb)
      ? left.data.color : mixColors(left.data.color, right.data.color);
    return { type: 'colored_blocks', data: { count: left.data.count + right.data.count, color } };
  }
  if ((op === 'x' || op === '*') && left.type === 'number') return applyJuxtaposition(left, right);
  if (op === '+') return concatenateValues(left, right);
  return concatenateValues(left, { type: 'text', data: ` ${op} ` }, right);
}

function evaluate(line) {
  try {
    line = line.replace(/[\x00-\x08\x0b\x0c\x0e-\x1f]/g, '').slice(0, 1000);
    const tokens = tokenize(line.trim());
    if (tokens.length === 0) return { type: 'text', data: '' };

    if (tokens[0].toLowerCase() === 'set' && tokens.length >= 3) {
      const name = tokens[1];
      const rhs = evaluate(tokens.slice(2).join(' '));
      setVariable(name, rhs);
      return rhs;
    }

    let acc = resolveToken(tokens[0]);
    let i = 1;
    while (i < tokens.length) {
      const tok = tokens[i];
      if (isOperator(tok)) {
        i++;
        if (i >= tokens.length) break;
        acc = applyOp(acc, tok, resolveToken(tokens[i]));
      } else {
        acc = applyJuxtaposition(acc, resolveToken(tok));
      }
      i++;
    }
    return acc;
  } catch {
    return { type: 'text', data: line };
  }
}

// ===================== RENDER (HTML) =====================

function isWhiteRgb(rgb) {
  return rgb[0] > 240 && rgb[1] > 240 && rgb[2] > 240;
}

function makeColorBlock(rgb) {
  const span = document.createElement('span');
  span.className = 'color-block';
  span.style.backgroundColor = rgbStr(rgb);
  if (isWhiteRgb(rgb)) span.style.border = '1px solid #888';
  return span;
}

	function renderToNode(value) {
	  try {
	    switch (value.type) {
	      case 'number': return document.createTextNode(String(value.data));
	      case 'fraction': return document.createTextNode(value.data.text);
	      case 'text':   return document.createTextNode(value.data);
	      case 'emoji': {
	        const span = document.createElement('span');
	        span.className = 'emoji';
	        span.textContent = value.data;
	        return span;
	      }
	      case 'color':  return makeColorBlock(value.data.rgb);
	      case 'colored_blocks': {
	        const frag = document.createDocumentFragment();
	        const count = Math.max(0, Math.min(value.data.count, 300));
        for (let i = 0; i < count; i++) frag.appendChild(makeColorBlock(value.data.color.rgb));
        return frag;
      }
      case 'list': {
        const frag = document.createDocumentFragment();
        for (const v of value.data) frag.appendChild(renderToNode(v));
        return frag;
      }
      default: return document.createTextNode(String(value.data ?? ''));
    }
  } catch {
    return document.createTextNode(String(value?.data ?? ''));
  }
}

function renderToDisplay(value) {
  // Plain-text version for logging (strips color blocks to names)
  return valueToPlainString(value);
}

// ===================== REPL =====================

const outputEl  = document.getElementById('output');
const inputEl   = document.getElementById('input');
let lastDrawing = null;

function addLine(content, cls = 'result') {
  const div = document.createElement('div');
  div.className = `output-line ${cls}`;
  if (typeof content === 'string') {
    div.textContent = content;
  } else {
    div.appendChild(content);
  }
  outputEl.appendChild(div);
  outputEl.scrollTop = outputEl.scrollHeight;
}

// Log session start
serverLog({ type: 'start', version: '1.0.0' });

inputEl.addEventListener('keydown', (e) => {
  const isEnter =
    e.key === 'Enter' ||
    e.key === 'NumpadEnter' ||
    e.code === 'Enter' ||
    e.code === 'NumpadEnter';
  if (!isEnter) return;
  e.preventDefault();
  const raw = inputEl.value;
  inputEl.value = '';

  addLine(`> ${raw}`, 'input-echo');

  const trimmed = raw.trim();

  if (trimmed === '') {
    addLine('');
    serverLog({ type: 'input', raw: '', display: '' });
    return;
  }

  if (trySayCommand(trimmed)) return;

  if (tryLaunchGame(trimmed)) {
    addLine(`Opening ${trimmed.toLowerCase()}...`, 'system');
    serverLog({ type: 'input', raw: trimmed, display: `[launch ${trimmed.toLowerCase()}]` });
    return;
  }

  if (tryEmojiAction(trimmed)) return;

  if (tryThemeCommand(trimmed)) return;

  if (trimmed.toLowerCase() === 'draw') {
    serverLog({ type: 'input', raw: trimmed, display: '[entering drawing mode]' });
    enterDrawMode();
    return;
  }

  if (trimmed.toLowerCase() === 'print') {
    if (!lastDrawing) {
      addLine('No drawing yet! Type "draw" first.');
      serverLog({ type: 'input', raw: trimmed, display: '[no drawing]' });
    } else {
      saveDrawing();
    }
    return;
  }

  try {
    const result = evaluate(trimmed);
    const display = renderToDisplay(result);

    const div = document.createElement('div');
    div.className = 'output-line result';
    div.appendChild(renderToNode(result));
    outputEl.appendChild(div);
    outputEl.scrollTop = outputEl.scrollHeight;

    serverLog({ type: 'input', raw: trimmed, output: result, display });
  } catch {
    addLine(raw);
    serverLog({ type: 'input', raw, display: raw });
  }
});

// ===================== DRAWING MODE =====================

const replMode  = document.getElementById('repl-mode');
const drawMode  = document.getElementById('draw-mode');
const canvas    = document.getElementById('draw-canvas');
const ctx       = canvas.getContext('2d');
const elPen     = document.getElementById('status-pen');
const elSwatch  = document.getElementById('status-swatch');
const elColor   = document.getElementById('status-color-name');

const CELL_W = 16;
const CELL_H = 20;
let COLS, ROWS, grid, cursorX, cursorY, colorIndex, penDown;

function initGrid() {
  const container = document.getElementById('canvas-container');
  COLS = Math.floor(container.clientWidth / CELL_W);
  ROWS = Math.floor(container.clientHeight / CELL_H);
  canvas.width  = COLS * CELL_W;
  canvas.height = ROWS * CELL_H;
  grid = Array.from({ length: ROWS }, () =>
    Array.from({ length: COLS }, () => ({ char: ' ', color: null }))
  );
  cursorX = Math.floor(COLS / 2);
  cursorY = Math.floor(ROWS / 2);
  colorIndex = 0;
  penDown = false;
}

function clamp() {
  cursorX = Math.max(0, Math.min(cursorX, COLS - 1));
  cursorY = Math.max(0, Math.min(cursorY, ROWS - 1));
}

function stamp() {
  if (penDown) {
    grid[cursorY][cursorX] = { char: ' ', color: COLOR_CYCLE[colorIndex % COLOR_CYCLE.length].rgb };
  }
}

function renderCanvas() {
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.font = `${CELL_H - 2}px monospace`;
  ctx.textBaseline = 'top';

  for (let y = 0; y < ROWS; y++) {
    for (let x = 0; x < COLS; x++) {
      const cell = grid[y][x];
      const px = x * CELL_W, py = y * CELL_H;
      if (cell.color) {
        ctx.fillStyle = rgbStr(cell.color);
        ctx.fillRect(px, py, CELL_W, CELL_H);
      } else if (cell.char !== ' ') {
        ctx.fillStyle = '#fff';
        ctx.fillText(cell.char, px, py);
      }
    }
  }

  // Cursor
  const col = COLOR_CYCLE[colorIndex % COLOR_CYCLE.length];
  ctx.strokeStyle = rgbStr(col.rgb);
  ctx.lineWidth = 2;
  ctx.strokeRect(cursorX * CELL_W + 1, cursorY * CELL_H + 1, CELL_W - 2, CELL_H - 2);

  // Status bar
  elPen.textContent = penDown ? 'PEN DOWN' : 'pen up';
  elPen.classList.toggle('down', penDown);
  elSwatch.style.backgroundColor = rgbStr(col.rgb);
  elSwatch.style.border = isWhiteRgb(col.rgb) ? '1px solid #888' : '1px solid #555';
  elColor.textContent = col.name || 'mixed';
}

function enterDrawMode() {
  replMode.style.display = 'none';
  drawMode.style.display = 'flex';
  initGrid();
  renderCanvas();
  document.addEventListener('keydown', onDrawKey, true);
}

function exitDrawMode() {
  document.removeEventListener('keydown', onDrawKey, true);

  // Snapshot grid for later use
  lastDrawing = {
    grid: grid.map(r => r.map(c => ({ ...c }))),
    cols: COLS,
    rows: ROWS,
    canvas,       // keep live canvas reference for quick re-render
  };

  // Log the drawing (canvas data, same format as TUI)
  const canvasData = grid.map(row => row.map(cell => ({ char: cell.char, color: cell.color })));
  serverLog({ type: 'drawing', canvas: canvasData });

  drawMode.style.display = 'none';
  replMode.style.display = 'flex';
  inputEl.focus();
  saveDrawing();
}

const DRAW_PREVENT = new Set(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' ','Tab']);

function onDrawKey(e) {
  if (DRAW_PREVENT.has(e.key)) e.preventDefault();
  switch (e.key) {
    case 'Escape':
      exitDrawMode(); break;
    case 'ArrowUp':
      stamp(); cursorY--; clamp(); stamp(); renderCanvas(); break;
    case 'ArrowDown':
      stamp(); cursorY++; clamp(); stamp(); renderCanvas(); break;
    case 'ArrowRight':
      stamp(); cursorX++; clamp(); stamp(); renderCanvas(); break;
    case 'ArrowLeft':
      stamp(); cursorX--; clamp(); stamp(); renderCanvas(); break;
    case ' ':
      penDown = !penDown;
      if (penDown) stamp();
      renderCanvas(); break;
    case 'Tab':
      colorIndex++;
      renderCanvas(); break;
    case 'Enter':
    case 'NumpadEnter':
      stamp(); cursorY++; cursorX = 0; clamp();
      if (penDown) stamp();
      renderCanvas(); break;
    case 'Backspace':
      grid[cursorY][cursorX] = { char: ' ', color: null };
      renderCanvas(); break;
    default:
      if (e.key.length === 1 && e.key.charCodeAt(0) >= 32) {
        grid[cursorY][cursorX] = { char: e.key, color: null };
        cursorX++; clamp();
        renderCanvas();
      }
  }
}

async function saveDrawing() {
  const d = lastDrawing;

  // Render to an off-screen canvas (cursor-free)
  const off = document.createElement('canvas');
  off.width  = d.cols * CELL_W;
  off.height = d.rows * CELL_H;
  const c = off.getContext('2d');
  c.fillStyle = '#111';
  c.fillRect(0, 0, off.width, off.height);
  c.font = `${CELL_H - 2}px monospace`;
  c.textBaseline = 'top';
  for (let y = 0; y < d.rows; y++) {
    for (let x = 0; x < d.cols; x++) {
      const cell = d.grid[y][x];
      const px = x * CELL_W, py = y * CELL_H;
      if (cell.color) {
        c.fillStyle = rgbStr(cell.color);
        c.fillRect(px, py, CELL_W, CELL_H);
      } else if (cell.char !== ' ') {
        c.fillStyle = '#fff';
        c.fillText(cell.char, px, py);
      }
    }
  }

  const dataUrl = off.toDataURL('image/png');

  // Try to save via server (writes to prints/ directory)
  const filepath = await serverSaveDrawing(dataUrl);

  if (filepath) {
    // Server saved it — show path, no forced download needed
    addLine(`Saved! ${filepath}`, 'system');
  } else {
    // Server not available — fall back to browser download
    const a = document.createElement('a');
    a.href = dataUrl;
    a.download = `drawing-${new Date().toISOString().replace(/[:.]/g, '-')}.png`;
    a.click();
    addLine('Drawing downloaded!', 'system');
  }

  serverLog({ type: 'input', raw: 'print', display: '[print]' });
}
</script>
