<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Fibonacci Sequence</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #202124;
        --paper: #fffdf8;
        --panel: #ffffff;
        --red: #e43d30;
        --blue: #2878d4;
        --green: #178b58;
        --yellow: #f7c948;
        --orange: #f28b30;
        --purple: #8b5ac7;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          linear-gradient(90deg, rgba(23, 139, 88, 0.06) 0 25%, transparent 25% 100%),
          linear-gradient(180deg, rgba(247, 201, 72, 0.08), rgba(40, 120, 212, 0.07)),
          var(--paper);
        color: var(--ink);
        font-family: Arial, Helvetica, sans-serif;
      }

      main {
        width: min(1180px, calc(100% - 32px));
        margin: 0 auto;
        padding: 28px 0 40px;
      }

      header {
        margin-bottom: 22px;
      }

      h1,
      h2 {
        margin: 0;
        line-height: 0.95;
        letter-spacing: 0;
      }

      h1 {
        font-size: clamp(2.1rem, 5vw, 4.8rem);
      }

      h2 {
        font-size: clamp(1.4rem, 3vw, 2.2rem);
        margin-bottom: 12px;
      }

      .layout {
        margin-bottom: 32px;
      }

      .fib-card {
        --accent: var(--blue);
        display: grid;
        grid-template-rows: 1fr auto;
        overflow: hidden;
        border: 2px solid color-mix(in srgb, var(--accent), #ffffff 38%);
        border-radius: 8px;
        background:
          linear-gradient(135deg, color-mix(in srgb, var(--accent), #ffffff 84%), #fff 55%);
        box-shadow: 0 10px 26px rgba(32, 33, 36, 0.08);
        color: inherit;
        text-decoration: none;
      }

      .image-stage {
        display: grid;
        place-items: center;
        min-height: 0;
        padding: clamp(6px, 2vw, 18px);
      }

      .image-stage img {
        display: block;
        width: auto;
        height: auto;
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
        filter: drop-shadow(0 8px 10px rgba(32, 33, 36, 0.15));
      }

      .notation {
        display: flex;
        align-items: baseline;
        justify-content: center;
        gap: 7px;
        padding: 8px 10px 10px;
        font-weight: 800;
        background: rgba(255, 255, 255, 0.76);
      }

      .power {
        color: var(--accent);
        font-size: 1rem;
        line-height: 1;
      }

      .equals {
        color: var(--ink);
        font-size: 1rem;
      }

      .value {
        font-size: 2rem;
        line-height: 1;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .spiral {
        position: relative;
        aspect-ratio: 89 / 55;
        border: 2px solid #d9d4c7;
        border-radius: 8px;
        background: #fff;
        overflow: hidden;
      }

      .spiral .fib-card {
        position: absolute;
        grid-template-rows: 1fr;
        min-width: 0;
        min-height: 0;
        border-radius: 0;
        box-shadow: none;
      }

      .spiral .image-stage {
        padding: 5%;
      }

      .spiral .tiny .image-stage {
        display: none;
      }

      .single-value {
        display: grid;
        place-items: center;
        height: 100%;
        font-weight: 800;
        font-size: clamp(0.45rem, 1.5vw, 0.85rem);
      }

      .card-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
        gap: 16px;
      }

      .card-grid .fib-card {
        min-height: 320px;
      }

      @media (max-width: 720px) {
        main {
          width: min(100% - 20px, 1180px);
          padding-top: 18px;
        }

        .layout {
          margin-bottom: 24px;
        }

        .card-grid {
          grid-template-columns: 1fr;
        }
      }

      @media print {
        @page {
          size: landscape;
          margin: 0.35in;
        }

        body {
          background: #fff;
        }

        main {
          width: 100%;
          padding: 0;
          -webkit-print-color-adjust: exact;
          print-color-adjust: exact;
        }

        h1 {
          font-size: 26pt;
        }

        h2 {
          font-size: 14pt;
          margin-bottom: 8px;
        }

        .layout + .layout {
          break-before: page;
          page-break-before: always;
        }

        .fib-card {
          border-color: #bbb;
          box-shadow: none;
          overflow: hidden;
          break-inside: avoid;
          page-break-inside: avoid;
        }

        .image-stage img {
          filter: none;
        }

        .power,
        .equals {
          font-size: 10pt;
        }

        .value {
          font-size: 22pt;
        }

        .card-grid {
          grid-template-columns: repeat(5, 1fr);
          gap: 8px;
        }

        .card-grid .fib-card {
          grid-template-rows: minmax(0, 1fr) auto;
          min-height: 1.55in;
        }

        .card-grid .image-stage {
          height: 1.12in;
          min-height: 0;
          padding: 7px;
        }

        .card-grid .image-stage img {
          max-height: 100%;
        }

        .card-grid .notation {
          padding: 5px 8px 6px;
        }

        .spiral {
          max-height: 6.6in;
        }

        a[href]::after {
          content: none !important;
        }
      }
    </style>
  </head>
